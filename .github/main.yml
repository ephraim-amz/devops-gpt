name: Deployment on new tag

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm test
      - run: echo "Déploiement en cours..."
        if: startsWith(github.ref, 'refs/tags/v')